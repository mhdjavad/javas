name: Append Large File to Repository
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'File URL to download'
        required: true
      name:
        description: 'File name (without extension)'
        required: true
        default: 'large-file'

jobs:
  append:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download file
        run: |
          wget -O "${{ inputs.name }}.bin" "${{ inputs.url }}"
          ls -la
      
      - name: Split file
        run: |
          split -b 90M "${{ inputs.name }}.bin" "${{ inputs.name }}_chunk_"
          rm "${{ inputs.name }}.bin"
          ls -la
      
      - name: Create restore script
        run: |
          echo "cat ${{ inputs.name }}_chunk_* > ${{ inputs.name }}.bin" > restore.sh
          chmod +x restore.sh
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Add large file" || echo "Nothing to commit"
          git push
